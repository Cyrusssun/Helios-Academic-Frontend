repository: Cyrusssun/Helios-Academic-Frontend
url: "https://cyrusssun.github.io"
baseurl: "/Helios-Academic-Frontend"

title: "Helios Academy Practice Portal"
email:
description: "AP exam practice questions, instant feedback, and performance analytics for serious students."
minimal_mistakes_skin: default
search: true

# Build settings
markdown: kramdown
remote_theme: mmistakes/minimal-mistakes
permalink: /:categories/:title/
paginate: 5
paginate_path: /page:num/

include:
  - _pages
  - _pages/Helios-academic

plugins:
  - jekyll-paginate
  - jekyll-sitemap
  - jekyll-gist
  - jekyll-feed
  - jemoji
  - jekyll-include-cache

author:
  name: "Helios Academy"
  bio: "AP exam practice for students who want results."

footer:
  links:
    # 已删除 GitHub 链接，如需添加其他链接按格式写在这里

defaults:
  - scope:
      path: ""
      type: posts
    values:
      layout: single
      author_profile: false
      read_time: false
      comments: false
      share: false
      related: false
  - scope:
      path: "_pages"
      type: pages
    values:
      layout: single
      author_profile: false

category_archive:
  type: liquid
  path: /categories/
tag_archive:
  type: liquid
  path: /tags/
after_footer_scripts:
  - /assets/js/nav-color.js
collections:
  courses:
    output: true
    permalink: /courses/:name/